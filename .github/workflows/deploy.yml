name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Print Node & npm versions
        run: |
          node --version
          npm --version
          npx --version || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check wrangler (debug)
        run: |
          echo "Checking wrangler..."
          npx wrangler --version || true

      - name: Verify Cloudflare Token Configuration
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CF_API_TOKEN}" ]; then
            echo "::error::The GitHub Secret 'CLOUDFLARE_API_TOKEN' is missing or empty."
            echo "Please go to Settings > Secrets and variables > Actions in your GitHub repository, and add a new Repository Secret named CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          echo "Cloudflare API Token is configured. Verifying identity..."
          npx wrangler whoami --api-token "$CF_API_TOKEN"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Dump wrangler logs on failure
        if: failure()
        run: |
          LOG_DIR="$HOME/.config/.wrangler/logs"
          echo "Looking for wrangler logs in $LOG_DIR"
          if [ -d "$LOG_DIR" ]; then
            for f in "$LOG_DIR"/*.log; do
              echo "=== $f ==="
              sed -n '1,400p' "$f"
            done
          else
            echo "No wrangler logs found at $LOG_DIR"
