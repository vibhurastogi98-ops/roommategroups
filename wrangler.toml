# Cloudflare dashboard deploy compatibility.
# The canonical Worker config lives in backend/wrangler.toml for local/backend work.
# Cloudflare's configured deploy command runs `npx wrangler deploy` from repo root,
# so this root config points Wrangler at the moved backend worker and web build.

name                = "roommategroups"
main                = "backend/worker.ts"
compatibility_date  = "2026-04-22"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[assets]
directory           = "web/dist"
not_found_handling  = "single-page-application"

[[d1_databases]]
binding       = "DB"
database_name = "roommatedb"
database_id   = "48c563a0-0557-49f7-8e76-5dc4f1efd7a8"

[[r2_buckets]]
binding             = "BUCKET"
bucket_name         = "roommate-bucket"
preview_bucket_name = "roommate-bucket-preview"
