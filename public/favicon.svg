<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="rounded-corners">
      <rect x="0" y="0" width="100" height="100" rx="20" ry="20" />
    </clipPath>
  </defs>
  <g clip-path="url(#rounded-corners)">
    <!-- Background halves -->
    <rect x="0" y="0" width="50" height="100" fill="#111111" />
    <rect x="50" y="0" width="50" height="100" fill="#FFFFFF" />
    
    <!-- R and G text -->
    <text x="26" y="68" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="52" text-anchor="middle" fill="#FFFFFF">R</text>
    <text x="74" y="68" font-family="'Inter', 'Arial Black', sans-serif" font-weight="900" font-size="52" text-anchor="middle" fill="#111111">G</text>
  </g>
</svg>
